<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="site box-office pour un cinema" />
    <title>MY-CINEMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900 flex min-h-screen">
    <nav
      class="w-64 bg-indigo-900 text-white shadow-xl flex flex-col fixed h-full z-20"
    >
      <div class="p-6 border-b border-indigo-800">
        <h1 class="text-xl font-bold flex flex-col gap-1">
          <span class="text-2xl">🎬 My Cinema</span>
          <span class="text-white font-light text-xs uppercase tracking-widest"
            >Administration</span
          >
        </h1>
      </div>

      <div class="flex flex-col mt-6 px-4 gap-3">
        <button
          id="btn-films"
          class="flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-lg hover:bg-indigo-800 transition-all cursor-pointer text-left w-full"
        >
          <span>🎞️</span> FILMS
        </button>
        <button
          id="btn-rooms"
          class="flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-lg hover:bg-indigo-800 transition-all cursor-pointer text-left w-full"
        >
          <span>🏛️</span> SALLES
        </button>
        <button
          id="btn-screening"
          class="flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-lg shadow-inner cursor-pointer text-left w-full"
        >
          <span>📅</span> PLANNING
        </button>
      </div>

      <div class="mt-auto p-6 text-xs text-white border-t border-indigo-800">
        &copy; 2026 My Cinema Admin
      </div>
    </nav>

    <main class="flex-1 ml-64 p-10">
      <div class="max-w-7xl mx-auto">
        <div
          class="flex justify-between items-center mb-6 container mx-auto px-4"
        >
          <h2
            class="text-2xl font-bold text-slate-800 border-l-4 border-indigo-600 pl-4"
          >
            Catalogue des Films
          </h2>
          <button
            id="open-add-modal"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg transition-all flex items-center gap-2"
          >
            <span class="text-white">+</span> AJOUTER UN FILM
          </button>
        </div>
        <div
          id="movie-list"
          class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 container mx-auto px-4 py-8"
        ></div>
        <div
          class="flex justify-between items-center mb-6 container mx-auto px-4"
        >
          <h2
            class="text-2xl font-bold text-slate-800 border-l-4 border-indigo-600 pl-4"
          >
            Liste des Salles
          </h2>
          <button
            id="open-add-modal"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg transition-all flex items-center gap-2"
          >
            <span class="text-white">+</span> AJOUTER UNE SALLE
          </button>
        </div>
        <div
          id="room-list"
          class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
        ></div>
        <div
          class="flex justify-between items-center mb-6 container mx-auto px-4"
        >
          <h2
            class="text-2xl font-bold text-slate-800 border-l-4 border-indigo-600 pl-4 my-2"
          >
            Le planning des Séances
          </h2>
          <button
            id="open-add-modal"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg transition-all flex items-center gap-2"
          >
            <span class="text-white">+</span> AJOUTER UNE SEANCE
          </button>
        </div>
        <div
          id="screening-list"
          class="flex bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden overflow-x-auto"
        >
          <div class="w-20 flex flex-col sticky left-0 z-10"></div>
        </div>
      </div>
    </main>

    <div
      id="movie-modal"
      class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-center justify-center"
    >
      <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
        <h3 id="modal-title" class="text-xl font-bold mb-4">Ajouter un film</h3>

        <form id="movie-form" class="flex flex-col gap-4">
          <input type="hidden" id="movie-id" />

          <div>
            <label
              for="movie-title-input"
              class="block text-sm font-medium mb-1"
              >Titre du Film</label
            >
            <input
              type="text"
              id="movie-title-input"
              class="w-full border p-2 rounded-lg"
            />

            <label
              for="movie-releaseYear-input"
              class="block text-sm font-medium mb-1"
              >Année</label
            >
            <input
              type="number"
              id="movie-releaseYear-input"
              class="w-full border p-2 rounded-lg"
            />

            <label
              for="movie-duration-input"
              class="block text-sm font-medium mb-1"
              >Durée en minutes</label
            >
            <input
              type="number"
              id="movie-duration-input"
              class="w-full border p-2 rounded-lg"
            />
          </div>

          <label
            for="movie-description-input"
            class="block text-sm font-medium mb-1"
            >Description</label
          >
          <textarea
            id="movie-description-input"
            class="w-full border p-2 rounded-lg"
          ></textarea>

          <label for="movie-genre-input" class="block text-sm font-medium mb-1"
            >Genre</label
          >
          <input
            type="text"
            id="movie-genre-input"
            class="w-full border p-2 rounded-lg"
          />

          <label for="movie-img-input" class="block text-sm font-medium mb-1"
            >Nom de l'image (ex: film.jpg)</label
          >
          <input
            type="text"
            id="movie-img-input"
            class="w-full border p-2 rounded-lg"
          />

          <div class="flex justify-end gap-3 mt-4">
            <button
              type="button"
              id="close-modal"
              class="px-4 py-2 text-slate-500"
            >
              Annuler
            </button>
            <button
              type="submit"
              class="bg-indigo-600 text-white px-4 py-2 rounded-lg"
            >
              Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/movies.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/planning.js"></script>

    <script src="js/index.js"></script>
  </body>
</html>
